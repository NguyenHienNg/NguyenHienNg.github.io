<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập / Đăng Ký</title>
    <style>
        body { font-family: Arial, sans-serif; }
        .container { max-width: 400px; margin: auto; padding: 20px; border: 1px solid #ccc; border-radius: 5px; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h2 id="form-title">Đăng Ký</h2>
        <form id="user-form">
            <input type="text" id="username" placeholder="Tên người dùng" required><br><br>
            <input type="email" id="email" placeholder="Email" required><br><br>
            <input type="password" id="password" placeholder="Mật khẩu" required><br><br>
            <button type="submit">Gửi</button>
        </form>
        <p id="toggle-form" style="cursor: pointer; color: blue;">Đã có tài khoản? Đăng nhập</p>
    </div>

    <script>
        const userForm = document.getElementById('user-form');
        const formTitle = document.getElementById('form-title');
        const toggleForm = document.getElementById('toggle-form');

        let users = [];

        // Tải dữ liệu người dùng từ tệp JSON
        fetch('users.json')
            .then(response => response.json())
            .then(data => {
                users = data;
            });

        userForm.addEventListener('submit', function(event) {
            event.preventDefault();
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // Kiểm tra xem người dùng đã tồn tại chưa
            const existingUser  = users.find(user => user.username === username || user.email === email);
            if (formTitle.innerText === 'Đăng Ký') {
                if (existingUser ) {
                    alert('Tên người dùng hoặc email đã tồn tại!');
                } else {
                    users.push({ username, email, password });
                    alert('Đăng ký thành công!');
                    saveUsers();
                }
            } else {
                // Đăng nhập
                if (existingUser  && existingUser .password === password) {
                    window.location.href = 'welcome.html';
                } else {
                    alert('Thông tin đăng nhập không chính xác!');
                }
            }
        });

        toggleForm.addEventListener('click', function() {
            if (formTitle.innerText === 'Đăng Ký') {
                formTitle.innerText = 'Đăng Nhập';
                toggleForm.innerText = 'Chưa có tài khoản? Đăng ký';
                document.getElementById('email').classList.add('hidden');
            } else {
                formTitle.innerText = 'Đăng Ký';
                toggleForm.innerText = 'Đã có tài khoản? Đăng nhập';
                document.getElementById('email').classList.remove('hidden');
            }
        });

        function saveUsers() {
            const blob = new Blob([JSON.stringify(users)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'users.json';
            a.click();
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
