<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chào mừng</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #f0f8ff;
        }
        .welcome-container {
            text-align: center;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }
        h1 {
            color: #333;
        }
        button {
            margin-top: 20px;
            padding: 10px 20px;
            background: #333;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background: #555;
        }
    </style>
</head>
<body>
    <div class="welcome-container">
        <h1>Chào mừng đến với Trang web của chúng tôi!</h1>
        <p>Chúng tôi rất vui khi bạn ở đây.</p>
        <button onclick="logout()">Đăng xuất</button>
    </div>

    <script>
        function logout() {
            window.location.href = 'index.html'; // Chuyển hướng về trang đăng nhập/đăng ký
        }
    </script>
</body>
</html>
