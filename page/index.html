<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trang nhập mã key</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="main-container">
    <div id="key-section">
      <h1>Nhập mã key của bạn</h1>
      <input type="password" id="key-input" placeholder="Nhập mã key...">
      <button id="submit-key">Xác nhận</button>
      <p id="error-message"></p>
    </div>
    <div id="welcome-section" style="display: none;">
      <h1>Chào mừng bạn!</h1>
      <p>Bạn đã nhập đúng mã key. Chào mừng đến với trang web.</p>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
